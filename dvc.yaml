stages:
# The stages section defines the different stages of the machine learning pipeline,
# including data preparation, model training, and evaluation. Each stage specifies
# the command to execute, the dependencies (input files and scripts), and the outputs
# generated by that stage. The prepare stage handles data preprocessing and generates
# the raw and processed datasets, as well as baseline statistics for drift detection. 
# The train stage trains a logistic regression model using the processed training data 
# and saves the trained model. The
  prepare:
    cmd: python -m src.data_prep
    deps:
      - src/data_prep.py
      - src/common.py
      - params.yaml
    outs:
      - data/raw/iris.csv
      - data/processed/train.csv
      - data/processed/valid.csv
      - drift/baseline_reference.csv
      - drift/baseline_stats.json

  train:
    cmd: python -m src.train
    deps:
      - src/train.py
      - src/common.py
      - params.yaml
      - data/processed/train.csv
      - data/processed/valid.csv
    outs:
      - models/model.joblib

  evaluate:
    cmd: python -m src.evaluate
    deps:
      - src/evaluate.py
      - src/common.py
      - params.yaml
      - data/processed/valid.csv
      - models/model.joblib
    outs:
      - metrics/confusion_matrix.csv
    metrics:
      - metrics/eval_metrics.json

  retrain:
    cmd: python -m src.retrain
    deps:
      - src/retrain.py
      - src/common.py
      - params.yaml
      - data/processed/train.csv
      - data/processed/valid.csv
    metrics:
      - metrics/retrain_report.json